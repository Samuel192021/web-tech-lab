<!DOCTYPE html>
<html>
<head>
    <title>Elite Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <header>
        <h1>🎓 Student Management</h1>
        <input type="text" id="searchBox" placeholder="Search student...">
    </header>

    <div class="stats">
        <div class="card">
            <h3>Total Students</h3>
            <p id="totalStudents">0</p>
        </div>
        <div class="card">
            <h3>Average Marks</h3>
            <p id="avgMarks">0</p>
        </div>
        <div class="card">
            <h3>Top Score</h3>
            <p id="topScore">0</p>
        </div>
    </div>

    <form id="studentForm">
        <input type="text" id="studentId" placeholder="ID" required>
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="course" placeholder="Course" required>
        <input type="number" id="marks" placeholder="Marks" required>
        <button type="submit">Add Student</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Course</th>
                <th>Marks</th>
                <th>Grade</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table>

</div>

<div id="toast"></div>

<script src="script.js"></script>
</body>
</html>
