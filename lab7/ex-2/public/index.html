<!DOCTYPE html>
<html>

<head>
<title>Online Book Finder</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<h1 class="title">
<i class="fa-solid fa-book"></i>
Online Book Finder
</h1>

<div class="controls">

<div class="search-box">
<i class="fa-solid fa-search"></i>
<input type="text" id="search" placeholder="Search book title...">
</div>

<select id="category">
<option value="">Select Category</option>
<option value="Programming">Programming</option>
<option value="Database">Database</option>
<option value="AI">AI</option>
</select>

<button onclick="searchBook()">
<i class="fa-solid fa-magnifying-glass"></i> Search
</button>

<button onclick="sortPrice()">
<i class="fa-solid fa-dollar-sign"></i> Sort Price
</button>

<button onclick="sortRating()">
<i class="fa-solid fa-star"></i> Sort Rating
</button>

<button onclick="topBooks()">
<i class="fa-solid fa-crown"></i> Top Rated
</button>

</div>

<div id="books" class="books-container"></div>

<div class="load-btn">
<button onclick="nextPage()">Load More</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
